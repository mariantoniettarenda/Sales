name: Encrypt and deploy sales reports

# Si attiva ogni volta che n8n fa push di nuovi/aggiornati file di report
# (es. su un branch "raw-reports" o una cartella "raw/") e si occupa di
# cifrarli con StatiCrypt usando la stessa password/salt del portale,
# prima di pubblicarli su GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - "raw/**.html"

jobs:
  encrypt-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Encrypt new/updated reports with StatiCrypt
        env:
          # Imposta questi due valori come Secrets del repository:
          # Settings -> Secrets and variables -> Actions
          #   STATICRYPT_PASSWORD = la password del portale
          #   STATICRYPT_SALT     = lo stesso salt embeddato in index.html
          STATICRYPT_PASSWORD: ${{ secrets.STATICRYPT_PASSWORD }}
          STATICRYPT_SALT: ${{ secrets.STATICRYPT_SALT }}
        run: |
          mkdir -p encrypted
          for f in raw/*.html; do
            [ -e "$f" ] || continue
            name=$(basename "$f")
            echo "Cifro $name..."
            npx --yes staticrypt "$f" \
              -p "$STATICRYPT_PASSWORD" \
              --salt "$STATICRYPT_SALT" \
              -d encrypted \
              --config false
          done

      - name: Move encrypted reports to site root
        run: |
          cp encrypted/*.html . 2>/dev/null || true

      - name: Commit and push encrypted reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.html
          git diff --cached --quiet || git commit -m "Auto-encrypt updated reports [skip ci]"
          git push
