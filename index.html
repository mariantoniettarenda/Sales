        <title>Sales - Protected Portal</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">

        <style>
            /* --- PALETTE COLORI (Ispirato a Sowieso Wero) --- */
            :root {
                --bg-page: #FFFCEB;          /* Crema chiaro */
                --dark: #19191D;             /* Nero profondo per bordi e scritte */
                --pink: #FF678B;             /* Rosa evidenziatore */
                --yellow: #FFF48D;           /* Giallo limone */
                --lime: #8FF977;             /* Verde lime */
                --cyan: #70FAFD;             /* Turchese */
                
                --bg-color: var(--bg-page);
                --panel-bg: #ffffff;
                --panel-border: var(--dark);
                --accent: var(--dark);
                --accent-hover: var(--dark);
                --accent-light: var(--yellow);
                --text-primary: var(--dark);
                --text-secondary: rgba(25, 25, 29, 0.8);
                --text-muted: rgba(25, 25, 29, 0.5);
                --radius-xl: 32px;
                --radius-lg: 24px;
                --radius-md: 16px;
                --shadow-card: 8px 8px 0px var(--dark);
                --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-body {
                background-color: var(--bg-color);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .hidden {
                display: none !important;
            }

            /* Loading spinner */
            .staticrypt-spinner-container {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-color);
                z-index: 999;
            }

            .staticrypt-spinner {
                width: 32px;
                height: 32px;
                border: 3px solid var(--text-muted);
                border-top-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.8s cubic-bezier(0.6, 0.2, 0.1, 1) infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Page layout */
            .staticrypt-content {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 24px;
                animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .staticrypt-page {
                width: 100%;
                max-width: 440px;
                margin: 0 auto;
            }

            /* Schermata di login (Playful & bold) */
            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--panel-bg);
                border: 3px solid var(--panel-border);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-card);
                padding: 48px 36px;
                text-align: center;
            }

            /* Badge superiore */
            .staticrypt-badge {
                width: 64px;
                height: 64px;
                margin: 0 auto 24px;
                border-radius: 50%;
                background: var(--pink);
                color: var(--dark);
                border: 3px solid var(--dark);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 4px 4px 0px var(--dark);
                transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .staticrypt-form:hover .staticrypt-badge {
                transform: scale(1.1) rotate(6deg);
            }

            .staticrypt-title {
                font-family: 'Syne', sans-serif;
                font-size: 28px;
                font-weight: 800;
                color: var(--text-primary);
                letter-spacing: -0.02em;
                margin: 0 0 6px;
            }

            .staticrypt-subtitle {
                font-size: 15px;
                font-weight: 500;
                color: var(--text-secondary);
                margin: 0 0 24px;
                line-height: 1.5;
            }

            /* Badge dell'ultimo aggiornamento */
            .staticrypt-update-info {
                display: inline-flex;
                align-items: center;
                font-family: 'Syne', sans-serif;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--dark);
                background: var(--lime);
                border: 2px solid var(--dark);
                padding: 6px 14px;
                border-radius: 999px;
                margin-bottom: 32px;
                box-shadow: 2px 2px 0px var(--dark);
            }

            .staticrypt-eyebrow {
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: var(--text-muted);
                margin-bottom: 12px;
                display: block;
            }

            /* Input password */
            #staticrypt-form {
                text-align: left;
            }

            .staticrypt-password-container {
                position: relative;
                display: flex;
                align-items: center;
                background: #ffffff;
                border: 3px solid var(--dark);
                border-radius: var(--radius-md);
                margin: 0 0 16px;
                transition: all 0.2s ease;
            }

            .staticrypt-password-container:focus-within {
                box-shadow: 4px 4px 0px var(--dark);
                transform: translate(-2px, -2px);
            }

            .staticrypt-password-icon {
                position: absolute;
                left: 16px;
                display: flex;
                color: var(--dark);
                pointer-events: none;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: var(--font-sans);
                font-size: 15px;
                font-weight: 600;
                color: var(--text-primary);
                outline: 0;
                padding: 14px 48px 14px 44px;
                width: 100%;
            }

            .staticrypt-toggle-btn {
                position: absolute;
                right: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 36px;
                height: 36px;
                border: 0;
                background: transparent;
                border-radius: 50%;
                cursor: pointer;
                transition: background 0.2s ease;
            }

            .staticrypt-toggle-btn:hover {
                background: rgba(0, 0, 0, 0.05);
            }

            .staticrypt-toggle-password-visibility {
                width: 20px;
                height: 20px;
                pointer-events: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13px;
                font-weight: 600;
                color: var(--text-secondary);
                margin: 8px 0 24px;
                cursor: pointer;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 18px;
                height: 18px;
                border-radius: 6px;
                border: 2px solid var(--dark);
                accent-color: var(--dark);
                cursor: pointer;
            }

            /* Pulsante di decrittazione */
            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--yellow);
                width: 100%;
                border: 3px solid var(--dark);
                border-radius: var(--radius-md);
                padding: 15px;
                color: var(--dark);
                font-family: 'Syne', sans-serif;
                font-size: 16px;
                font-weight: 800;
                cursor: pointer;
                box-shadow: 4px 4px 0px var(--dark);
                transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--lime);
                transform: translate(-2px, -2px);
                box-shadow: 6px 6px 0px var(--dark);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translate(0px, 0px);
                box-shadow: 2px 2px 0px var(--dark);
            }

            a:focus-visible,
            button:focus-visible,
            input:focus-visible {
                outline: 3px solid var(--dark);
                outline-offset: 2px;
            }

            @media (max-width: 380px) {
                .staticrypt-form {
                    padding: 36px 24px;
                }
            }
        </style>
    </head>

        function setMode(mode) {
            const isLive = mode === "live";

            btnModeLive.classList.toggle("active", isLive);

            archiveView.classList.toggle("hidden", isLive);

            contextBar.classList.toggle("context-archive", !isLive);

            if (isLive) {
                contextBarText.textContent = "🟢 Dati in tempo reale, aggiornati ogni giorno dalla pipeline automatica.";

        btnModeLive.addEventListener("click", () => setMode("live"));

        const searchInput = document.getElementById("searchInput");

        function applyFilterAndSearch() {
            const searchValue = searchInput.value.toLowerCase().trim();
            const activePill = document.querySelector("#live-filter-pills .pill.active");
            const activeFilter = activePill.getAttribute("data-filter");

            cards.forEach((card) => {
                const searchText = card.getAttribute("data-search") || "";
                const titleText = card.querySelector(".card-title").textContent.toLowerCase();
                const descText = card.querySelector(".card-description").textContent.toLowerCase();

                const matchesSearch = titleText.includes(searchValue) || descText.includes(searchValue) || searchText.includes(searchValue);

                let matchesFilter = false;
                if (activeFilter === "all") {
                    matchesFilter = true;
                } else if (activeFilter === "vendite") {
                    matchesFilter = card.closest('[data-category-group="vendite"]') !== null;
                } else if (activeFilter === "competitors") {
                    matchesFilter = card.closest('[data-category-group="competitors"]') !== null;
                } else {
                    matchesFilter = card.getAttribute("data-category-type") === activeFilter;

                card.classList.toggle("hidden", !(matchesSearch && matchesFilter));

                        const visibleSubCards = nextGrid.querySelectorAll(".report-card:not(.hidden)");

        function buildArchiveTree() {
            archiveTree.innerHTML = "";

                const yearToggle = document.createElement("div");

yearToggle.innerHTML = "<span>📅 " + year + "</span><span class='chevron'>▼</span>";
                const monthsWrapper = document.createElement("div");
                monthsWrapper.className = "tree-months";

                MONTHS.forEach((month) => {
                    const key = year + "-" + month.abbr;
                    const isAvailable = Boolean(archiveManifest[key]);

                    const monthEl = document.createElement("div");
                    monthEl.className = "tree-month" + (isAvailable ? "" : " locked");
                    monthEl.dataset.month = month.abbr;
                    monthEl.dataset.year = year;
                    monthEl.dataset.monthName = month.name;
                    monthEl.dataset.available = isAvailable ? "1" : "0";
                    monthEl.innerHTML = "<span>" + month.name + "</span><span>" + (isAvailable ? "➔" : "🔒") + "</span>";

                    monthEl.addEventListener("click", () => onMonthClick(monthEl, isAvailable, year, month));

                    monthsWrapper.appendChild(monthEl);
                });

                yearToggle.addEventListener("click", () => {
                    monthsWrapper.classList.toggle("collapsed");
                    const chevron = yearToggle.querySelector(".chevron");
                    chevron.textContent = monthsWrapper.classList.contains("collapsed") ? "►" : "▼";

                yearBlock.appendChild(yearToggle);
                yearBlock.appendChild(monthsWrapper);
                archiveTree.appendChild(yearBlock);
            });
        }

        function onMonthClick(monthEl, isAvailable, year, month) {
            document.querySelectorAll(".tree-month").forEach((m) => m.classList.remove("active"));

            if (!isAvailable) {
                renderLockedNotice(month.name, year);
                return;
            }

            monthEl.classList.add("active");
            renderArchiveMonth(year, month);
        }

            archiveContent.innerHTML =

                "</div>";

            const key = year + "-" + month.abbr;

            const archivedOn = manifestEntry ? manifestEntry.archivedOn : "";

            archiveContent.innerHTML =

                    document.querySelectorAll("#archive-filter-pills .pill").forEach((b) => b.classList.remove("active"));
                    btn.classList.add("active");
                    activeArchiveFilter = btn.getAttribute("data-filter");
                    renderArchiveGrid(year, month);
                });
            });

            renderArchiveGrid(year, month);
        }

        function renderArchiveGrid(year, month) {
            const wrapper = document.getElementById("archive-grid-wrapper");
            wrapper.innerHTML = "";

            const groups = [
                { key: "vendite", title: "Analisi di Vendita", titleClass: "vendite" },
                { key: "clienti-finali", title: "Clienti Finali", titleClass: "clienti", isSub: true, parentGroup: "clienti" },
                { key: "distributori", title: "Distributori", titleClass: "clienti", isSub: true, parentGroup: "clienti" },
                { key: "competitors", title: "Analisi Competitors", titleClass: "competitors" },
            ];

            let renderedAny = false;

            groups.forEach((group) => {
                const items = reportsMetadata.filter((rep) => {
                    if (group.parentGroup) {
                        return rep.categoryGroup === group.parentGroup && rep.categoryType === group.key;
                    }
                    return rep.categoryGroup === group.key;
                });

                if (items.length === 0) return;
                if (activeArchiveFilter !== "all" && activeArchiveFilter !== group.key) return;

                renderedAny = true;

                const sectionEl = document.createElement("div");
                sectionEl.className = "section-wrapper";

                const headerHTML = group.isSub

                const cardsHTML = items

            if (!renderedAny) {

                    "<p>Nessun report archiviato corrisponde a questo filtro per " + month.name + " " + year + ".</p>" +
                    "</div>";

        }

        buildArchiveTree();
        setMode("live");
