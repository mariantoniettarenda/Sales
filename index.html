<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Sales - Protected Page</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --brand-50: #eaf6ec;
                --brand-400: #5fb35a;
                --brand-500: #3f8f4c;
                --brand-600: #2f6e3a;
                --ink-900: #1f2a24;
                --ink-600: #4b5b50;
                --ink-400: #6b7d72;
                --border: #e3e8e4;
                --surface: #ffffff;
                --radius-lg: 16px;
                --radius-md: 10px;
                --shadow-card: 0 1px 2px rgba(15, 35, 20, 0.05), 0 16px 36px rgba(15, 35, 20, 0.16);
                --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            }

            * {
                box-sizing: border-box;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
                margin: 0;
            }

            .staticrypt-body {
                background: linear-gradient(160deg, var(--brand-400) 0%, var(--brand-500) 55%, var(--brand-600) 100%);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .hidden {
                display: none !important;
            }

            /* loading spinner */
            .staticrypt-spinner-container {
                height: 100%;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 2.25rem;
                height: 2.25rem;
                border: 3px solid rgba(255, 255, 255, 0.35);
                border-right-color: transparent;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            /* page layout */
            .staticrypt-content {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 32px 20px;
            }

            .staticrypt-page {
                width: 100%;
                max-width: 400px;
                margin: 0 auto;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--surface);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-card);
                padding: 40px 36px;
                text-align: center;
            }

            /* header */
            .staticrypt-badge {
                width: 52px;
                height: 52px;
                margin: 0 auto 18px;
                border-radius: 50%;
                background: var(--brand-50);
                color: var(--brand-600);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .staticrypt-title {
                font-size: clamp(20px, 5vw, 23px);
                font-weight: 700;
                color: var(--ink-900);
                letter-spacing: -0.01em;
                margin: 0 0 4px;
            }

            .staticrypt-subtitle {
                font-size: 14px;
                color: var(--ink-600);
                margin: 0;
            }

            .staticrypt-update-info {
                display: inline-flex;
                align-items: center;
                font-size: 12px;
                font-weight: 600;
                color: var(--brand-600);
                background: var(--brand-50);
                padding: 6px 12px;
                border-radius: 999px;
                margin-top: 16px;
            }

            /* quick access (no password required) */
            .staticrypt-eyebrow {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.04em;
                text-transform: uppercase;
                color: var(--ink-400);
                margin: 0 0 10px;
                text-align: left;
            }

            .staticrypt-link-container {
                margin-top: 22px;
            }

            .staticrypt-link {
                display: flex;
                align-items: center;
                gap: 10px;
                width: 100%;
                padding: 12px 14px;
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                color: var(--ink-900);
                text-decoration: none;
                font-weight: 600;
                font-size: 13.5px;
                transition: border-color 0.15s ease, background 0.15s ease;
            }

            .staticrypt-link:hover,
            .staticrypt-link:focus-visible {
                border-color: var(--brand-400);
                background: var(--brand-50);
            }

            .staticrypt-link-icon {
                display: flex;
                color: var(--brand-600);
                flex-shrink: 0;
            }

            .staticrypt-link-arrow {
                margin-left: auto;
                color: var(--ink-400);
                flex-shrink: 0;
            }

            .staticrypt-hr {
                margin: 26px 0;
                border: 0;
                border-top: 1px solid var(--border);
            }

            /* password form */
            #staticrypt-form {
                text-align: left;
            }

            .staticrypt-password-container {
                position: relative;
                display: flex;
                align-items: center;
                background: #f4f6f4;
                border: 1px solid var(--border);
                border-radius: var(--radius-md);
                margin: 0 0 16px;
                transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
            }

            .staticrypt-password-container:focus-within {
                background: var(--surface);
                border-color: var(--brand-500);
                box-shadow: 0 0 0 3px var(--brand-50);
            }

            .staticrypt-password-icon {
                position: absolute;
                left: 14px;
                display: flex;
                color: var(--ink-400);
                pointer-events: none;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: var(--font-sans);
                font-size: 15px;
                color: var(--ink-900);
                outline: 0;
                padding: 13px 44px 13px 40px;
                width: 100%;
            }

            .staticrypt-toggle-btn {
                position: absolute;
                right: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 34px;
                height: 34px;
                border: 0;
                background: transparent;
                border-radius: 50%;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .staticrypt-toggle-btn:hover {
                background: var(--brand-50);
            }

            .staticrypt-toggle-password-visibility {
                width: 20px;
                height: 20px;
                pointer-events: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13.5px;
                color: var(--ink-600);
                margin: 2px 0 20px;
                cursor: pointer;
            }

            .staticrypt-remember input[type="checkbox"] {
                width: 17px;
                height: 17px;
                margin: 0;
                accent-color: var(--brand-500);
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--brand-500);
                width: 100%;
                border: 0;
                border-radius: var(--radius-md);
                padding: 14px;
                color: #ffffff;
                font-family: var(--font-sans);
                font-size: 14.5px;
                font-weight: 600;
                cursor: pointer;
                transition: background 0.15s ease, transform 0.05s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--brand-600);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: scale(0.99);
            }

            a:focus-visible,
            button:focus-visible,
            input:focus-visible {
                outline: 2px solid var(--brand-600);
                outline-offset: 2px;
            }

            @media (max-width: 380px) {
                .staticrypt-form {
                    padding: 32px 22px;
                }
            }
        </style>
    </head>
