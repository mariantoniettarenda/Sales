<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>Sales - Protected Portal</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <!-- Google Fonts per coerenza tipografica -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

        <style>
            :root {
                --bg-page: #FFFCEB;          /* Crema chiaro */
                --dark: #19191D;             /* Nero profondo per bordi e scritte */
                --pink: #FF678B;             /* Rosa evidenziatore */
                --yellow: #FFF48D;           /* Giallo limone */
                --lime: #8FF977;             /* Verde lime */
                --cyan: #70FAFD;             /* Turchese */
                --radius-xl: 32px;
                --radius-lg: 24px;
                --radius-md: 16px;
                --shadow-card: 8px 8px 0px var(--dark);
                --font-sans: "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                --font-syne: "Syne", sans-serif;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            .staticrypt-html,
            .staticrypt-body {
                height: 100%;
            }

            .staticrypt-body {
                background-color: var(--bg-page);
                font-family: var(--font-sans);
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .hidden {
                display: none !important;
            }

            /* Loading spinner coerente con il design */
            .staticrypt-spinner-container {
                position: fixed;
                inset: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg-page);
                z-index: 999;
            }

            .staticrypt-spinner {
                width: 36px;
                height: 36px;
                border: 4px solid rgba(25, 25, 29, 0.15);
                border-top-color: var(--dark);
                border-radius: 50%;
                animation: spinner-border 0.8s cubic-bezier(0.6, 0.2, 0.1, 1) infinite;
            }

            @keyframes spinner-border {
                100% {
                    transform: rotate(360deg);
                }
            }

            /* Page layout */
            .staticrypt-content {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 24px;
                animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            }

            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(15px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .staticrypt-page {
                width: 100%;
                max-width: 440px;
                margin: 0 auto;
            }

            /* Schermata di login (Playful & bold) */
            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                border: 3px solid var(--dark);
                border-radius: var(--radius-xl);
                box-shadow: var(--shadow-card);
                padding: 48px 36px;
                text-align: center;
            }

            /* Badge superiore */
            .staticrypt-badge {
                width: 64px;
                height: 64px;
                margin: 0 auto 24px;
                border-radius: 50%;
                background: var(--pink);
                color: var(--dark);
                border: 3px solid var(--dark);
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 4px 4px 0px var(--dark);
                transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            }

            .staticrypt-form:hover .staticrypt-badge {
                transform: scale(1.1) rotate(6deg);
            }

            .staticrypt-title {
                font-family: var(--font-syne);
                font-size: 28px;
                font-weight: 800;
                color: var(--dark);
                letter-spacing: -0.02em;
                margin-bottom: 6px;
            }

            .staticrypt-subtitle {
                font-size: 15px;
                font-weight: 500;
                color: rgba(25, 25, 29, 0.75);
                line-height: 1.5;
            }

            .staticrypt-hr {
                margin: 24px 0;
                border: 0;
                border-top: 3px solid var(--dark);
            }

            .staticrypt-eyebrow {
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.05em;
                text-transform: uppercase;
                color: rgba(25, 25, 29, 0.5);
                margin-bottom: 12px;
                display: block;
                text-align: left;
            }

            /* Input password */
            .staticrypt-password-container {
                position: relative;
                display: flex;
                align-items: center;
                background: #ffffff;
                border: 3px solid var(--dark);
                border-radius: var(--radius-md);
                margin: 0 0 16px;
                transition: all 0.2s ease;
            }

            .staticrypt-password-container:focus-within {
                box-shadow: 4px 4px 0px var(--dark);
                transform: translate(-2px, -2px);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: var(--font-sans);
                font-size: 15px;
                font-weight: 600;
                color: var(--dark);
                outline: 0;
                padding: 14px 48px 14px 16px;
                width: 100%;
                box-sizing: border-box;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                position: absolute;
                right: 14px;
                top: 50%;
                transform: translateY(-50%);
                opacity: 0.8;
                transition: opacity 0.2s ease;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 1;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 13px;
                font-weight: 600;
                color: rgba(25, 25, 29, 0.8);
                margin: 8px 0 24px;
                cursor: pointer;
                user-select: none;
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.3);
                accent-color: var(--dark);
                cursor: pointer;
                margin-right: 4px;
            }

            /* Pulsante di decrittazione */
            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--yellow);
                width: 100%;
                border: 3px solid var(--dark);
                border-radius: var(--radius-md);
                padding: 15px;
                color: var(--dark);
                font-family: var(--font-syne);
                font-size: 15px;
                font-weight: 800;
                text-transform: uppercase;
                cursor: pointer;
                box-shadow: 4px 4px 0px var(--dark);
                transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--lime);
                transform: translate(-2px, -2px);
                box-shadow: 6px 6px 0px var(--dark);
            }

            .staticrypt-form .staticrypt-decrypt-button:active {
                transform: translate(0px, 0px);
                box-shadow: 2px 2px 0px var(--dark);
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

                        <button class="pill" id="btn-toggle-focus" style="background-color: var(--cyan); box-shadow: 4px 4px 0px var(--dark);">
                            🖥️ Vista Espansa (Nascondi Colonne)
                        </button>
                    </div>
                </header>

                <div class="archive-layout">
                    <!-- Albero anno/mese generato da JS -->
                    <aside class="archive-sidebar">
                        <div class="archive-sidebar-title">📅 Periodi disponibili</div>
                        <div class="archive-tree" id="archive-tree"></div>
                    </aside>

                    <section class="archive-content" id="archive-content">
                        <div class="archive-placeholder">
                            <span class="big-emoji">📁</span>
                            <p>Seleziona un mese dall'elenco a sinistra per consultare i report archiviati di quel periodo.</p>
                        </div>
                    </section>

                    <!-- BARRA FEEDBACK DI MARY -->
                    <aside class="feedback-sidebar">
                        <div class="avatar-container">
                            <div class="mary-avatar">
                                <!-- Mary Vector Icon: Blonde Curly Hair, Medium-Large Glasses -->
                                <svg viewBox="0 0 100 100" width="100%" height="100%">
                                    <!-- Capelli Ricci Biondi sullo sfondo -->
                                    <circle cx="35" cy="35" r="18" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    <circle cx="65" cy="35" r="18" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    <circle cx="50" cy="30" r="18" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    <circle cx="28" cy="52" r="15" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    <circle cx="72" cy="52" r="15" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    
                                    <!-- Viso -->
                                    <circle cx="50" cy="54" r="26" fill="#FFFCEB" stroke="#19191D" stroke-width="3" />
                                    
                                    <!-- Boccoli anteriori -->
                                    <circle cx="36" cy="36" r="9" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    <circle cx="64" cy="36" r="9" fill="#FFF48D" stroke="#19191D" stroke-width="3" />
                                    
                                    <!-- Occhi -->
                                    <circle cx="38" cy="52" r="3.5" fill="#19191D" />
                                    <circle cx="62" cy="52" r="3.5" fill="#19191D" />
                                    
                                    <!-- Occhiali Neri Medio-Grandi -->
                                    <rect x="28" y="42" width="20" height="20" rx="5" fill="none" stroke="#19191D" stroke-width="4.5" />
                                    <rect x="52" y="42" width="20" height="20" rx="5" fill="none" stroke="#19191D" stroke-width="4.5" />
                                    <line x1="48" y1="52" x2="52" y2="52" stroke="#19191D" stroke-width="4.5" />
                                    
                                    <!-- Stanghette occhiali -->
                                    <path d="M28 48 L20 46" stroke="#19191D" stroke-width="3.5" />
                                    <path d="M72 48 L80 46" stroke="#19191D" stroke-width="3.5" />
                                    
                                    <!-- Sorriso -->
                                    <path d="M45 68 Q50 73 55 68" stroke="#19191D" stroke-width="3" fill="none" stroke-linecap="round" />
                                </svg>
                            </div>
                            <div class="mary-info">
                                <span class="mary-name">Mary</span>
                                <span class="mary-role">Sales Analysis</span>
                            </div>
                        </div>

                        <div class="feedback-box">
                            <div class="feedback-title">📢 Feedback di recap sul mese</div>
                            <div class="feedback-text" id="feedback-text">Seleziona un periodo archiviato per leggerne le osservazioni strategiche.</div>
                        </div>
                    </aside>
                </div>
            </div>

            <footer>
                <p>Magicmotorsport Sales Analytics Vault • Hub di analisi progettato <span>MRenda</span></p>
            </footer>
        </div>
    </main>

    <script>
        /* ============================================================
           1) CONFIGURAZIONE ARCHIVIO E FEEDBACK
           ============================================================ */
        const ARCHIVE_YEARS = [2026];

        const MONTHS = [
            { abbr: "gen", name: "Gennaio" },
            { abbr: "feb", name: "Febbraio" },
            { abbr: "mar", name: "Marzo" },
            { abbr: "apr", name: "Aprile" },
            { abbr: "mag", name: "Maggio" },
            { abbr: "giu", name: "Giugno" },
            { abbr: "lug", name: "Luglio" },
            { abbr: "ago", name: "Agosto" },
            { abbr: "set", name: "Settembre" },
            { abbr: "ott", name: "Ottobre" },
            { abbr: "nov", name: "Novembre" },
            { abbr: "dic", name: "Dicembre" },
        ];

        // 👉 n8n: aggiungere qui una riga ad ogni chiusura mensile per l'archivio e per il feedback di Mary.
        const archiveManifest = {
            "2026-gen": { 
                archivedOn: "01/02/2026",
                feedback: "Gennaio si è definito como mese di transizione: progetto eBay in chiusura, assestamento dei progetti Finance e Carrelli Abbandonati, gestiti da Mary nel 2025 e da Gennaio dal team Sales (Andrea, Roberto, Samuele e Gateano) e inizio del progetto N8N. In generale il mese si chiude con un +4.2% di fatturato vs il 2025. Dato che sarà analizzato sempre di più nei mesi successivi per analisi di prodotti, andamento e previsionale (supporto per Offerte, Distributori e flussi)"
            },
            "2026-feb": { 
                archivedOn: "01/03/2026",
                feedback: "A febbraio registriamo un leggero calo nel recupero carrelli (17% vs 20%). Con uno switch di canale - recuperano più tramite Operatore Sales che tramite Distributore. N8N viene integrato nel progetto Carrelli abbandonati, per evitare il flusso manuale di aggiornamento, contatto Sedi e calcolo recuperi. Grazie ai feedback, si valuta con MGKT la possibilità di aggiungere il prodotto Upgrade sullo SHOP. Il progetto Academy viene inserito in N8N per facilitare il flusso di contatto post-corso, carrelli abbandonati sui corsi e recap mensile sull'andamento dei recuperi"
            },
            "2026-mar": { 
                archivedOn: "01/04/2026",
                feedback: "Marzo si conferma un mese di pressione commerciale sul fronte rinnovi: emergono per la prima volta segnali di contestazione dell'abbonamento per assenza di protocolli, con clienti che scelgono di non rinnovare. Il recupero carrelli raggiunge €34.7K (8.14%), trainato dagli Operatori (16%) e dallo Shop (11%), con un forte calo di recupero tramite Distributori . Sul fronte prodotti, si avvia un'analisi sistematica del portafoglio HW Flex, IXI e Terze Parti (Silca, Xhorse) con classificazione BOOST/PROTECT/STOP/EXIT per sbloccare capitale immobilizzato. StageX registra il record storico a febbraio (€288K baseline) e un +41% YoY. Avviati i progetti Kibana per il monitoraggio protocolli e il Weekly Competitors Tracker."
            },
            "2026-apr": { 
                archivedOn: "01/05/2026",
                feedback: "Aprile segna un aumento di recuperi a €79.2K (15%), con uno shift netto di canale: i Distributori dominano al 72% (€57K), mentre Operatori e Shop coprono la parte restante. I feedback evidenziano come principale causa di abbandono le spese di spedizione sull'hardware. Avviato il progetto CCS/Crisp per l'estrazione automatica e la categorizzazione dei feedback. Sul fronte fiere, prima analisi Kibana su Istanbul con 1.216 clienti attivi mappati e identificazione dei protocolli più utilizzati (SIMOS PCR2.1, Marelli 8F3/9DF, MD1CS003). Avviata anche la mappatura per Milano Truck e i Albania/Montenegro. Prosegue il piano di smaltimento Hyperpedal (339 pz, €6K bloccati) e l'analisi precedente analisi sul Brand Terzi sulla settimana 18, fa emergere un fatturato di €203K (+80% vs Q1 2025)"
            },
            "2026-mag": { 
                archivedOn: "01/06/2026",
                feedback: "Maggio segna una conferma cambio di tono nella customer base: il prodotto è solido e la fidelizzazione regge, ma cresce una componente critica che chiede roadmap chiara su MD1/MDG1 e più velocità sulle ECU protette. Sul fronte hardware, l'Heavy Duty inverte il trend negativo di inizio anno su HW Flex: il comparto Truck/Agri/Bus esplode con pacing fino a +171% (Cummins) e trascina l'intero catalogo HW da -41% (WK10) a -10% (WK28), con €213K di fatturato extra grazie alle edizioni Flex 30. Sul canale, il recupero carrelli è trainato quasi esclusivamente dagli Operatori Sales (74%), con i Distributori a zero contributo. L'analisi delle liste distributori Loyal conferma forti discrepanze: alcuni non lavorano i contatti affatto. Avviata la campagna N8N Fryon post fill-in con Nicolò e completata l'analisi storica della fiera di Francoforte 2024 (€183K riconducibile, +1 nuovo distributore slovacco)"
            }
        };

        /* ============================================================
           2) SELETTORE DI MODALITÀ (Live ↔ Archivio)
           ============================================================ */
        const btnModeLive = document.getElementById("btn-mode-live");
        const btnModeArchive = document.getElementById("btn-mode-archive");
        const dashboardView = document.getElementById("dashboard-view");
        const archiveView = document.getElementById("archive-view");
        const contextBar = document.getElementById("context-bar");
        const contextBarText = document.getElementById("context-bar-text");
        const contextBarSub = document.getElementById("context-bar-sub");

        function setMode(mode) {
            const isLive = mode === "live";

            btnModeLive.classList.toggle("active", isLive);
            btnModeArchive.classList.toggle("active", !isLive);
            dashboardView.classList.toggle("hidden", !isLive);
            archiveView.classList.toggle("hidden", isLive);

            contextBar.classList.toggle("context-live", isLive);
            contextBar.classList.toggle("context-archive", !isLive);

            if (isLive) {
                contextBarText.textContent = "🟢 Dati in tempo reale, aggiornati ogni giorno dalla pipeline automatica.";
                contextBarSub.textContent = "";
            } else {
                contextBarText.textContent = "📁 Stai consultando l'Archivio Storico: numeri cristallizzati, non più in movimento.";
                contextBarSub.textContent = "";
            }
        }

        btnModeLive.addEventListener("click", () => setMode("live"));
        btnModeArchive.addEventListener("click", () => setMode("archive"));

        /* ============================================================
           2.1) GESTIONE DELLO SWITCH "FOCUS MODE / VISTA ESPANSA"
           ============================================================ */
        const btnToggleFocus = document.getElementById("btn-toggle-focus");
        const archiveLayout = document.querySelector(".archive-layout");
        let isFocusMode = false;

        btnToggleFocus.addEventListener("click", () => {
            isFocusMode = !isFocusMode;
            archiveLayout.classList.toggle("focus-mode", isFocusMode);
            if (isFocusMode) {
                btnToggleFocus.textContent = "📋 Mostra Colonne Laterali";
                btnToggleFocus.style.backgroundColor = "var(--pink)";
            } else {
                btnToggleFocus.textContent = "🖥️ Vista Espansa (Nascondi Colonne)";
                btnToggleFocus.style.backgroundColor = "var(--cyan)";
            }
        });

        /* ============================================================
           3) DASHBOARD LIVE — ricerca e filtri
           ============================================================ */
        const searchInput = document.getElementById("searchInput");
        const liveFilterButtons = document.querySelectorAll("#live-filter-pills .pill");
        const cards = document.querySelectorAll("#dashboard-view .report-card");
        const sections = document.querySelectorAll("#dashboard-view .section-wrapper");

        function applyFilterAndSearch() {
            const searchValue = searchInput.value.toLowerCase().trim();
            const activePill = document.querySelector("#live-filter-pills .pill.active");
            const activeFilter = activePill.getAttribute("data-filter");

            cards.forEach((card) => {
                const searchText = card.getAttribute("data-search") || "";
                const titleText = card.querySelector(".card-title").textContent.toLowerCase();
                const descText = card.querySelector(".card-description").textContent.toLowerCase();

                const matchesSearch = titleText.includes(searchValue) || descText.includes(searchValue) || searchText.includes(searchValue);

                let matchesFilter = false;
                if (activeFilter === "all") {
                    matchesFilter = true;
                } else if (activeFilter === "vendite") {
                    matchesFilter = card.closest('[data-category-group="vendite"]') !== null;
                } else if (activeFilter === "competitors") {
                    matchesFilter = card.closest('[data-category-group="competitors"]') !== null;
                } else {
                    matchesFilter = card.getAttribute("data-category-type") === activeFilter;
                }

                card.classList.toggle("hidden", !(matchesSearch && matchesFilter));
            });

            sections.forEach((section) => {
                const visibleCards = section.querySelectorAll(".report-card:not(.hidden)");
                const subTags = section.querySelectorAll(".sub-category-tag");

                section.classList.toggle("hidden", visibleCards.length === 0);

                subTags.forEach((tag) => {
                    const nextGrid = tag.nextElementSibling;
                    if (nextGrid && nextGrid.classList.contains("grid-layout")) {
                        const visibleSubCards = nextGrid.querySelectorAll(".report-card:not(.hidden)");
                        tag.classList.toggle("hidden", visibleSubCards.length === 0);
                    }
                });
            });
        }

        searchInput.addEventListener("input", applyFilterAndSearch);
        liveFilterButtons.forEach((button) => {
            button.addEventListener("click", () => {
                liveFilterButtons.forEach((btn) => btn.classList.remove("active"));
                button.classList.add("active");
                applyFilterAndSearch();
            });
        });

        /* ============================================================
           4) ARCHIVIO — albero anno/mese generato dinamicamente
           ============================================================ */
        const archiveTree = document.getElementById("archive-tree");
        const archiveContent = document.getElementById("archive-content");
        const feedbackText = document.getElementById("feedback-text");

        function buildArchiveTree() {
            archiveTree.innerHTML = "";

            ARCHIVE_YEARS.forEach((year, index) => {
                const yearBlock = document.createElement("div");

                const yearToggle = document.createElement("div");
                yearToggle.className = "tree-year";
                yearToggle.innerHTML = "<span>📅 " + year + "</span><span class='chevron'>▼</span>";
                const monthsWrapper = document.createElement("div");
                monthsWrapper.className = "tree-months";

                MONTHS.forEach((month) => {
                    const key = year + "-" + month.abbr;
                    const isAvailable = Boolean(archiveManifest[key]);

                    const monthEl = document.createElement("div");
                    monthEl.className = "tree-month" + (isAvailable ? "" : " locked");
                    monthEl.dataset.month = month.abbr;
                    monthEl.dataset.year = year;
                    monthEl.dataset.monthName = month.name;
                    monthEl.dataset.available = isAvailable ? "1" : "0";
                    monthEl.innerHTML = "<span>" + month.name + "</span><span>" + (isAvailable ? "➔" : "🔒") + "</span>";

                    monthEl.addEventListener("click", () => onMonthClick(monthEl, isAvailable, year, month));

                    monthsWrapper.appendChild(monthEl);
                });

                yearToggle.addEventListener("click", () => {
                    monthsWrapper.classList.toggle("collapsed");
                    const chevron = yearToggle.querySelector(".chevron");
                    chevron.textContent = monthsWrapper.classList.contains("collapsed") ? "►" : "▼";
                });

                yearBlock.appendChild(yearToggle);
                yearBlock.appendChild(monthsWrapper);
                archiveTree.appendChild(yearBlock);
            });
        }

        function onMonthClick(monthEl, isAvailable, year, month) {
            document.querySelectorAll(".tree-month").forEach((m) => m.classList.remove("active"));

            if (!isAvailable) {
                renderLockedNotice(month.name, year);
                feedbackText.textContent = "🔒 In attesa dei dati e dell'archiviazione di questo mese per compilare il feedback.";
                return;
            }

            monthEl.classList.add("active");
            renderArchiveMonth(year, month);
        }

        function renderLockedNotice(monthName, year) {
            archiveContent.innerHTML =
                '<div class="archive-locked-notice">' +
                '<span class="big-emoji">🔒</span>' +
                "<p>Il report di " + monthName + " " + year + " non è ancora stato archiviato. Sarà disponibile alla chiusura del mese, quando la pipeline genera lo snapshot.</p>" +
                "</div>";
        }

        // Funzione per mostrare il file HTML consolidato mensile dentro il pannello
        function renderArchiveMonth(year, month) {
            const key = year + "-" + month.abbr;
            const manifestEntry = archiveManifest[key];
            const archivedOn = manifestEntry ? manifestEntry.archivedOn : "";
            const currentFeedback = manifestEntry ? manifestEntry.feedback : "Nessun feedback registrato per questo periodo.";
            
            // Definisce il nome dell'HTML mensile da richiamare
            const filename = year + "-" + month.abbr + ".html";

            archiveContent.innerHTML =
                '<div class="archive-header-block">' +
                '<h2 class="archive-period-title">' + month.name + " " + year + "</h2>" +
                '<p class="archive-snapshot-note">📁 Snapshot cristallizzato il ' + archivedOn + " — i dati non vengono più aggiornati per questo periodo.</p>" +
                "</div>" +
                '<div class="archive-iframe-wrapper">' +
                '<iframe class="archive-iframe" src="' + filename + '" title="Report ' + month.name + ' ' + year + '"></iframe>' +
                '</div>';
                
            // Aggiorna dinamicamente la sidebar di Mary con il feedback salvato
            feedbackText.textContent = currentFeedback;
        }

        buildArchiveTree();
        setMode("live");
    </script>
</body>
</html>
